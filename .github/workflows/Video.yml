name: 24/7 VPS Session (sshx)

on:
  schedule:
    - cron: '0 */6 * * *'      # Har 6 ghante mein restart (safe)
  workflow_dispatch:           # Manual start

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # Maximum 6 hours

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Long-running sshx Session
        run: |
          echo "🚀 Starting sshx session for next 6 hours..."
          echo "Connect using the link that will appear below:"
          curl -sSf https://sshx.io/get | sh -s run --name "vps-session-$(date +%s)"
          
